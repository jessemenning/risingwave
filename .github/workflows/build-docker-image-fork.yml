name: Build Docker Image (Fork)

# Standalone Docker build workflow for forks — no Buildkite dependency.
# Builds from source and pushes to GitHub Container Registry (ghcr.io).
#
# Auto-triggers on push to feat/solace-source-connector when Rust source,
# Cargo files, or the Dockerfile changes. Skipped for docs, tests, and
# workflow-only changes.
#
# Manual usage:
#   gh workflow run 'Build Docker Image (Fork)' --ref feat/solace-source-connector
#   Or trigger via GitHub UI: Actions → Build Docker Image (Fork) → Run workflow
#
# Image is pushed to:
#   ghcr.io/<owner>/risingwave:<label>
#   ghcr.io/<owner>/risingwave:v<version>--<label>--<sha>--<branch>

on:
  push:
    branches: [feat/solace-source-connector]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'e2e_test/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      label:
        description: 'Image label tag (e.g. solace-connector, test)'
        required: true
        type: string
        default: 'solace-connector'
      cargo_profile:
        description: 'Cargo build profile (release, patch-production)'
        required: true
        type: string
        default: 'release'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/risingwave
  DEFAULT_LABEL: solace-connector
  DEFAULT_PROFILE: release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout solace-rs
        uses: actions/checkout@v4
        with:
          repository: jessemenning/solace-rs
          ref: main
          path: solace-rs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          NO_SLASH_BRANCH=${BRANCH_NAME//\//-}
          VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
          COMMIT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          LABEL="${{ github.event.inputs.label || env.DEFAULT_LABEL }}"
          IMAGE_TAG="v${VERSION}--${LABEL}--${COMMIT_SHA}--${NO_SLASH_BRANCH}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Export sccache runtime token
        # ACTIONS_RUNTIME_TOKEN is not accessible as a bash env var, but IS
        # accessible to Node.js actions via process.env. Use github-script to
        # read it and re-export it so build-push-action can pass it as a secret.
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('SCCACHE_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '')
            core.exportVariable('SCCACHE_CACHE_URL', process.env.ACTIONS_CACHE_URL || '')

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.label }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            CARGO_PROFILE=${{ github.event.inputs.cargo_profile || env.DEFAULT_PROFILE }}
            GIT_SHA=${{ github.sha }}
            SCCACHE_GHA_ENABLED=true
            ACTIONS_CACHE_URL=${{ env.SCCACHE_CACHE_URL }}
          secrets: |
            ACTIONS_RUNTIME_TOKEN=${{ env.SCCACHE_RUNTIME_TOKEN }}
          # sccache caches individual crate compilations across builds (GHA backend).
          # Docker layer cache (type=gha) caches layers that don't change between runs.
          # Together they cover both cases: unchanged layers and changed-but-cached crates.
          cache-from: type=gha
          cache-to: type=gha,mode=max
