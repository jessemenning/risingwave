name: Build Docker Image (Fork)

# Standalone Docker build workflow for forks — no Buildkite dependency.
# Builds from source and pushes to GitHub Container Registry (ghcr.io).
#
# Usage:
#   gh workflow run 'Build Docker Image (Fork)' --ref feat/solace-source-connector
#   Or trigger via GitHub UI: Actions → Build Docker Image (Fork) → Run workflow
#
# Image is pushed to:
#   ghcr.io/<owner>/risingwave:<label>
#   ghcr.io/<owner>/risingwave:v<version>--<label>--<sha>--<branch>

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Image label tag (e.g. solace-dev, test)'
        required: true
        type: string
        default: 'solace-dev'
      cargo_profile:
        description: 'Cargo build profile (release, patch-production)'
        required: true
        type: string
        default: 'release'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/risingwave

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout solace-rs
        uses: actions/checkout@v4
        with:
          repository: jessemenning/solace-rs
          ref: main
          path: solace-rs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          NO_SLASH_BRANCH=${BRANCH_NAME//\//-}
          VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
          COMMIT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          LABEL=${{ github.event.inputs.label }}
          IMAGE_TAG="v${VERSION}--${LABEL}--${COMMIT_SHA}--${NO_SLASH_BRANCH}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.label }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            CARGO_PROFILE=${{ github.event.inputs.cargo_profile }}
            GIT_SHA=${{ github.sha }}
          # Cache Docker layers in GitHub Actions cache.
          # First run is slow; subsequent runs on the same branch reuse cached layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
